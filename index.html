<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tower Defense</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas { display: block; }
  </style>
</head>
<body>

  <!-- Phaser 3 from CDN (no install needed) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>

  <!-- Game data / constants (must load first) -->
  <script src="src/data/config.js"></script>
  <script src="src/data/towers.js"></script>
  <script src="src/data/enemies.js"></script>
  <script src="src/data/waves.js"></script>

  <!-- Utilities -->
  <script src="src/utils/pathfinding.js"></script>

  <!-- Entities (no dependencies except data) -->
  <script src="src/entities/Enemy.js"></script>
  <script src="src/entities/Tower.js"></script>
  <script src="src/entities/Projectile.js"></script>

  <!-- Scenes (depend on entities + data) -->
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/UIScene.js"></script>

  <!-- Boot (must be last) -->
  <script src="src/main.js"></script>

</body>
</html>
